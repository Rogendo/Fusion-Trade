# ─────────────────────────────────────────────────────────────────────────────
# FusionTrade AI — Full Stack
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # background after first build
#   docker compose down                # stop everything
#   docker compose logs -f backend     # tail backend logs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis (message broker for Celery) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override localhost refs so containers talk to each other by service name
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/fusion_trade.db
      API_HOST: 0.0.0.0
      API_PORT: 2001
      FRONTEND_URL: http://localhost:8090
      CORS_ORIGINS: '["http://localhost:8090","http://localhost","http://nginx"]'
    volumes:
      # Persist SQLite DB and prediction logs across restarts
      - app_data:/app/data
      # Persist downloaded HuggingFace models (avoids re-downloading on restart)
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Celery Worker (background predictions + verification) ───────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/fusion_trade.db
    volumes:
      - app_data:/app/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q celery,predictions,verification

  # ── Celery Beat (scheduler — daily predictions at 06:00 UTC) ────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/fusion_trade.db
    volumes:
      - app_data:/app/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A workers.celery_app beat
      --loglevel=info
      --scheduler celery.schedulers.PersistentScheduler

  # ── Nginx (serves React frontend + reverse proxies /api to backend) ─────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8090:80"     # Frontend → http://localhost:8090
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount the React build from the backend image at build time
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend

  # ── One-shot container: copies frontend build into the shared volume ─────────
  frontend-copy:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - frontend_build:/target
    command: sh -c "cp -r /app/static/. /target/ && echo 'Frontend copied OK'"
    restart: "no"   # runs once then exits


volumes:
  redis_data:
  app_data:
  hf_cache:       # HuggingFace model cache (~2GB) — persisted so models aren't re-downloaded
  frontend_build:
